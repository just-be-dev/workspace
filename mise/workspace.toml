# workspace workstation tools — global mise drop-in.
#
# Symlinked to ~/.config/mise/conf.d/workspace.toml by [dotfiles] in ../mise.toml.
# mise loads conf.d/*.toml into the GLOBAL config, so these tools are active in
# every directory (not just this repo) — without editing your personal
# ~/.config/mise/config.toml.
[tools]
herdr = "latest"                                 # github:ogulcancelik/herdr — terminal agent multiplexer
neovim = "latest"                                # LazyVim runs on this
hunk = "latest"                                  # aqua:modem-dev/hunk — review-first diff viewer
"npm:@kitlangton/ghui" = "latest"                # GitHub PR TUI ("open in editor" -> nvim)
"npm:@earendil-works/pi-coding-agent" = "latest" # pi — the agent harness (config tracked under pi/)
"npm:@anthropic-ai/claude-code" = "latest"       # Claude Code CLI (provides `claude`)

# workspace — single entry point. From a clone:
#     ./install.sh
# min_version pins a known-good mise; bump after `mise self-update`.
min_version = "2026.6.14"

[settings]
experimental = true # required for `mise bootstrap` + [dotfiles]
pin = true
dotfiles.default_mode = "symlink"
minimum_release_age_excludes = ["github:can1357/oh-my-pi"]

[bootstrap.packages]
# Bare package names (no repo/ prefix): mise checks installs with `pacman -Q`,
# which rejects repo-qualified names and would report them missing forever.
"pacman:fish" = "latest"
"pacman:omarchy-fish" = "latest"
# Cask (no `ghostty` formula — don't add one); macOS-only, auto-skipped on Linux.
"brew-cask:ghostty" = "latest"

# Interactive rc files get "activate" (full env); login profiles get "shims" so
# non-interactive sessions still resolve tools without the activate hook.
[bootstrap.mise_shell_activate]
fish = "activate"
bashrc = "activate"
bash_profile = "shims"
zshrc = "activate"
zprofile = "shims"

[bootstrap.hooks.post-tools]
run = '''
# herdr dev-layout plugin. `herdr plugin link` needs a running herdr server, so
# if none is up start a transient headless one to register (persists on disk),
# then stop it. Must never fail the bootstrap.
if command -v herdr >/dev/null 2>&1; then
  herdr_plugin="${MISE_PROJECT_ROOT:-$PWD}/herdr/plugins/dev-layout"
  herdr_started=0
  if ! herdr status 2>/dev/null | grep -q 'status: running'; then
    herdr server >/dev/null 2>&1 &
    for _ in $(seq 1 25); do
      if herdr status 2>/dev/null | grep -q 'status: running'; then break; fi
      sleep 0.2
    done
    herdr_started=1
  fi
  herdr plugin link "$herdr_plugin" >/dev/null 2>&1 ||
    echo "warn: 'herdr plugin link $herdr_plugin' failed; run it yourself once herdr is running" >&2
  if [ "$herdr_started" = 1 ]; then
    herdr server stop >/dev/null 2>&1 || true
  fi
fi

if command -v npm >/dev/null 2>&1; then
  omp_plugins_dir="$HOME/.omp/plugins"
  mkdir -p "$omp_plugins_dir"
  npm --prefix "$omp_plugins_dir" install "${MISE_PROJECT_ROOT:-$PWD}/omp/plugins/pi-claude-bridge-0.6.2-omp.1.tgz" --save --ignore-scripts --no-audit --no-fund >/dev/null
fi

# fish shell (no mise backend). omarchy-fish on Arch layers omarchy's fish config;
# Homebrew elsewhere.
if command -v pacman >/dev/null 2>&1; then
  sudo pacman -S --needed --noconfirm omarchy-fish
elif command -v fish >/dev/null 2>&1; then
  echo "fish already installed"
elif command -v brew >/dev/null 2>&1; then
  brew install fish
else
  echo "skip fish: use pacman (Arch/Omarchy) or install Homebrew (macOS)"
fi

# Ghostty config, macOS only (Linux keeps omarchy's managed config).
if [ "$(uname)" = "Darwin" ]; then
  mkdir -p "$HOME/.config/ghostty"
  cp "${MISE_PROJECT_ROOT:-$PWD}/ghostty/config" "$HOME/.config/ghostty/config"
fi
'''

# Config symlinks. Sources are relative to this file; --force-dotfiles replaces
# existing real files.
[dotfiles]
# Global mise tools. `mise bootstrap` applies dotfiles before the tools step, so
# this symlink is in place before `mise install` runs and before post-tools hooks.
"~/.config/mise/conf.d/workspace.toml" = "mise/workspace.toml"
"~/.config/herdr/config.toml" = "herdr/config.toml"
# nvim overlays onto omarchy's base: *.lua links init.lua but skips the
# nvim-managed *.json lockfiles; symlink-each owns our lua/config + lua/plugins
# files, leaving omarchy's (options.lua, themes) in place.
"~/.config/nvim/*.lua"       = "nvim/*.lua"
"~/.config/nvim/lua/config"  = { source = "nvim/lua/config", mode = "symlink-each" }
"~/.config/nvim/lua/plugins" = { source = "nvim/lua/plugins", mode = "symlink-each" }
# ghostty NOT linked: [dotfiles] can't be OS-scoped and Linux keeps omarchy's
# config. Copied on macOS via the post-tools hook above.
# fish conf.d: symlink-each overlays our snippets onto omarchy-fish's managed
# conf.d without clobbering the files it drops there.
"~/.config/fish/conf.d" = { source = "fish/conf.d", mode = "symlink-each" }
"~/.config/ghui/config.json" = "ghui/config.json"
"~/.config/hunk/config.toml" = "hunk/config.toml"
# omp: non-secret config only (creds/state stay in ~/.omp/agent/). extensions
# uses symlink-each to overlay without clobbering tool-dropped files.
"~/.omp/agent/config.yml" = "omp/agent/config.yml"
"~/.omp/agent/extensions" = { source = "omp/agent/extensions", mode = "symlink-each" }
# pi: non-secret config only (auth.json, sessions/, etc. stay untracked).
# extensions uses symlink-each to overlay (leaves e.g. omarchy-system-theme.ts).
"~/.pi/agent/settings.json" = "pi/agent/settings.json"
"~/.pi/agent/extensions" = { source = "pi/agent/extensions", mode = "symlink-each" }
# Skills: symlink-each links each of our skills into these dirs without
# clobbering skill-manager installs (e.g. omarchy) that also live here.
"~/.agents/skills" = { source = "skills", mode = "symlink-each" }
"~/.claude/skills" = { source = "skills", mode = "symlink-each" }

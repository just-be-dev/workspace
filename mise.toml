# workspace
#
# Single entry point. From a clone, run:
#
#     mise trust -q && mise bootstrap --yes --force-dotfiles
#
# That symlinks every packaged config into ~/.config ([dotfiles]), installs the
# workstation tools ([tools] below), and runs the post-tools hook (herdr/omp
# plugins plus the fish shell — brew on macOS, omarchy-fish via pacman on Linux).
#
# `mise bootstrap` and the [dotfiles] section are experimental. min_version is
# pinned to a known-good mise; bump it after `mise self-update`.
min_version = "2026.6.14"

[settings]
# `mise bootstrap` and [dotfiles] are experimental — opt in here so the repo is
# self-contained (no global setting required).
experimental = true
pin = true
# String-form [dotfiles] entries below default to symlinks.
dotfiles.default_mode = "symlink"
minimum_release_age_excludes = ["github:can1357/oh-my-pi"]

[tools]
herdr = "latest"                                 # github:ogulcancelik/herdr — terminal agent multiplexer
hunk = "latest"                                  # aqua:modem-dev/hunk — review-first diff viewer
"npm:@kitlangton/ghui" = "latest"                # GitHub PR TUI ("open in editor" -> nvim)
"github:can1357/oh-my-pi" = "latest"             # omp — Oh My Pi agent CLI (config tracked under omp/)
"npm:@earendil-works/pi-coding-agent" = "latest" # pi — secondary agent harness (config tracked under pi/)
stylua = "latest"                                # Lua formatter for nvim config

# macOS-only. Omarchy already installs these on Linux (see its
# omarchy-base.packages: nvim, github-cli, claude-code, fzf, lazygit), so we
# scope them to macOS to avoid mise shadowing the system copies.
neovim = { version = "latest", os = ["macos"] }                          # LazyVim runs on this
gh = { version = "latest", os = ["macos"] }                              # GitHub CLI
"npm:@anthropic-ai/claude-code" = { version = "latest", os = ["macos"] } # Claude Code CLI (provides `claude`)
fzf = { version = "0.74.0", os = ["macos"] }                             # fuzzy finder
lazygit = { version = "0.63.0", os = ["macos"] }

[bootstrap.packages]
"pacman:extra/fish" = "latest"
"pacman:omarchy/omarchy-fish" = "latest"
# Ghostty ships as a Homebrew cask (there is no `ghostty` formula), and the cask
# backend is macOS-only, so mise auto-skips this on Linux where omarchy provides
# Ghostty. Do NOT add a `brew:ghostty` formula entry — it 404s on every platform.
"brew-cask:ghostty" = "latest"

[bootstrap.hooks.post-tools]
run = '''
# herdr dev-layout plugin. `herdr plugin link` registers the plugin over the
# running herdr server's socket, so on a fresh bootstrap (no server yet) it fails
# with a bare "Os NotFound". If a server is already up (you're in a herdr
# session) link against it; otherwise start a transient headless server just long
# enough to register — the registration persists on disk afterward. Linking is a
# convenience, so it must never fail the bootstrap.
if command -v herdr >/dev/null 2>&1; then
  herdr_plugin="${MISE_PROJECT_ROOT:-$PWD}/herdr/plugins/dev-layout"
  herdr_started=0
  if ! herdr status 2>/dev/null | grep -q 'status: running'; then
    herdr server >/dev/null 2>&1 &
    for _ in $(seq 1 25); do
      if herdr status 2>/dev/null | grep -q 'status: running'; then break; fi
      sleep 0.2
    done
    herdr_started=1
  fi
  herdr plugin link "$herdr_plugin" >/dev/null 2>&1 ||
    echo "warn: 'herdr plugin link $herdr_plugin' failed; run it yourself once herdr is running" >&2
  if [ "$herdr_started" = 1 ]; then
    herdr server stop >/dev/null 2>&1 || true
  fi
fi

if command -v npm >/dev/null 2>&1; then
  omp_plugins_dir="$HOME/.omp/plugins"
  mkdir -p "$omp_plugins_dir"
  npm --prefix "$omp_plugins_dir" install "${MISE_PROJECT_ROOT:-$PWD}/omp/plugins/pi-claude-bridge-0.6.2-omp.1.tgz" --save --ignore-scripts --no-audit --no-fund >/dev/null
fi

# fish shell. No clean mise backend exists, so (like the Ghostty cask before it)
# we install via the platform package manager here. On Arch/Omarchy pull
# omarchy-fish, which depends on fish and layers the omarchy fish config on top;
# on macOS use Homebrew. --needed keeps the pacman path idempotent. No-op
# cleanly when neither package manager is present.
if command -v pacman >/dev/null 2>&1; then
  sudo pacman -S --needed --noconfirm omarchy-fish
elif command -v fish >/dev/null 2>&1; then
  echo "fish already installed"
elif command -v brew >/dev/null 2>&1; then
  brew install fish
else
  echo "skip fish: use pacman (Arch/Omarchy) or install Homebrew (macOS)"
fi

# Ghostty config: macOS only. On Omarchy/Linux, Ghostty ships a managed config
# (dynamic theming, Hyprland fixes) that we intentionally leave alone, so this is
# not a [dotfiles] entry. On macOS there is no such base, so overlay our config.
if [ "$(uname)" = "Darwin" ]; then
  mkdir -p "$HOME/.config/ghostty"
  cp "${MISE_PROJECT_ROOT:-$PWD}/ghostty/config" "$HOME/.config/ghostty/config"
fi
'''

# ── Config symlinks ───────────────────────────────────────────────────────────
# Sources resolve relative to this file (the repo root). `mise bootstrap` /
# `mise dotfiles apply` create the links; existing real files are reported as
# conflicts unless you pass --force-dotfiles.
[dotfiles]
"~/.config/herdr/config.toml" = "herdr/config.toml"
# nvim runs atop omarchy's base config, so we overlay only our own files, leaving
# omarchy's siblings in each dir alone. The top-level glob catches init.lua while
# skipping the nvim-managed lazy-lock.json / lazyvim.json lockfiles (symlink-each
# can't filter those out by extension). lua/config and lua/plugins hold only our
# .lua files, so symlink-each owns them wholesale (options.lua is omarchy's to
# own, so it's kept out of the repo).
"~/.config/nvim/*.lua"       = "nvim/*.lua"
"~/.config/nvim/lua/config"  = { source = "nvim/lua/config", mode = "symlink-each" }
"~/.config/nvim/lua/plugins" = { source = "nvim/lua/plugins", mode = "symlink-each" }
# ghostty/config is intentionally NOT linked here. [dotfiles] entries can't be
# scoped by OS, and on Omarchy/Linux the live ~/.config/ghostty/config is a
# managed base (dynamic theming, Hyprland tweaks) we must leave untouched. We
# copy our config only on macOS via the post-tools hook below.
"~/.config/ghui/config.json" = "ghui/config.json"
"~/.config/hunk/config.toml" = "hunk/config.toml"
# omp (Oh My Pi). Only non-secret config is tracked; credentials and runtime
# state stay in ~/.omp/agent/agent.db and related files. The extensions dir uses
# symlink-each so we overlay our tracked extensions file-by-file without
# clobbering any that a tool (e.g. herdr) or omarchy drops in alongside them.
"~/.omp/agent/config.yml" = "omp/agent/config.yml"
"~/.omp/agent/extensions" = { source = "omp/agent/extensions", mode = "symlink-each" }
# pi (secondary agent harness). Only non-secret config is tracked: settings.json
# and the extensions dir. auth.json, sessions/, npm/, trust.json, etc. stay
# untracked. extensions uses symlink-each so our tracked extensions overlay onto
# the dir without removing tool-installed ones (e.g. omarchy-system-theme.ts).
"~/.pi/agent/settings.json" = "pi/agent/settings.json"
"~/.pi/agent/extensions" = { source = "pi/agent/extensions", mode = "symlink-each" }
# Agent skills live in the shared ~/.agents/skills dir (read by omp and other
# agents) and in ~/.claude/skills for Claude. Those dirs also hold
# skill-manager-installed skills, so we link each tracked skill individually
# rather than symlinking either whole directory.
"~/.agents/skills/effect-setup" = "skills/effect-setup"
"~/.agents/skills/mise-setup" = "skills/mise-setup"
"~/.claude/skills/effect-setup" = "skills/effect-setup"
"~/.claude/skills/mise-setup" = "skills/mise-setup"
